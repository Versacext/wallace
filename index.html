<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WALLACE CORP | NEURAL TERMINAL v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #05070a;
            --panel-bg: rgba(13, 17, 23, 0.8);
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #c9d1d9;
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        .terminal-border {
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.05);
            position: relative;
        }

        .terminal-border::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; width: 10px; height: 10px;
            border-top: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan);
        }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(0, 243, 255, 0.1);
            position: fixed; top: 0; z-index: 100;
            animation: scan 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -5%; }
            100% { top: 100%; }
        }

        .btn-action {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            transition: all 0.3s;
        }

        .btn-action:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); }
    </style>
</head>
<body class="min-h-screen p-2 md:p-4">
    <div class="scanline"></div>

    <header class="flex flex-col lg:flex-row justify-between items-center mb-4 p-4 terminal-border bg-[var(--panel-bg)] gap-4">
        <div class="flex items-center gap-6">
            <h1 class="orbitron text-2xl font-bold tracking-tighter text-[var(--neon-cyan)]">
                WALLACE<span class="text-white opacity-50">_SYSTEMS</span>
            </h1>
            <div class="hidden md:block text-[10px] opacity-50">
                CORE: v4.0.2-STABLE<br>ACCESS: AUTHORIZED
            </div>
        </div>

        <div class="flex flex-1 max-w-xl px-4">
            <div class="relative w-full">
                <input type="text" id="coinSearch" placeholder="SEARCH_ASSET (e.g. solana, dot...)" 
                    class="w-full bg-black/50 border border-cyan-900/50 rounded-none p-2 pl-10 focus:outline-none focus:border-cyan-400 text-cyan-400">
                <span class="absolute left-3 top-2.5 opacity-50">⚡</span>
            </div>
        </div>

        <div class="flex gap-4 items-center">
            <div id="connection-status" class="text-[10px] text-emerald-400 animate-pulse">● LINK_ESTABLISHED</div>
            <div id="server-time" class="text-xs font-bold">00:00:00</div>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-4">
        <aside class="col-span-12 lg:col-span-3 space-y-4">
            <div class="terminal-border p-4 bg-[var(--panel-bg)] h-[400px] flex flex-col">
                <h3 class="orbitron text-xs mb-4 text-cyan-400">HOT_ASSETS</h3>
                <div id="hot-list" class="space-y-2 overflow-y-auto flex-1 pr-2">
                    <div class="animate-pulse bg-white/5 h-12 w-full"></div>
                    <div class="animate-pulse bg-white/5 h-12 w-full"></div>
                    <div class="animate-pulse bg-white/5 h-12 w-full"></div>
                </div>
            </div>

            <div class="terminal-border p-4 bg-[var(--panel-bg)]">
                <h3 class="orbitron text-xs mb-2 text-purple-400">SYSTEM_LOGS</h3>
                <div class="text-[9px] font-light space-y-1 opacity-70" id="logs">
                    <div>> INITIALIZING NEURAL LINK...</div>
                    <div>> FETCHING MARKET_DATA...</div>
                </div>
            </div>
        </aside>

        <section class="col-span-12 lg:col-span-9 space-y-4">
            <div class="terminal-border bg-[var(--panel-bg)] p-6">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <div class="flex items-center gap-3">
                            <h2 id="active-coin-name" class="text-3xl font-bold orbitron">BITCOIN</h2>
                            <span id="active-coin-symbol" class="opacity-40">BTC/USD</span>
                        </div>
                        <div id="active-price" class="text-4xl font-bold text-white mt-1">$0.00</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="setTime('1')" class="px-3 py-1 text-[10px] btn-action">1D</button>
                        <button onclick="setTime('7')" class="px-3 py-1 text-[10px] btn-action">7D</button>
                        <button onclick="setTime('30')" class="px-3 py-1 text-[10px] btn-action">1M</button>
                    </div>
                </div>
                
                <div id="main-chart" class="w-full h-[450px]"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="terminal-border p-4 bg-cyan-950/20">
                    <div class="text-[10px] opacity-50 uppercase">Market Cap</div>
                    <div id="stat-cap" class="text-lg font-bold text-cyan-400">---</div>
                </div>
                <div class="terminal-border p-4 bg-purple-950/20">
                    <div class="text-[10px] opacity-50 uppercase">24h Vol</div>
                    <div id="stat-vol" class="text-lg font-bold text-purple-400">---</div>
                </div>
                <div class="terminal-border p-4 bg-emerald-950/20">
                    <div class="text-[10px] opacity-50 uppercase">All-Time High</div>
                    <div id="stat-ath" class="text-lg font-bold text-emerald-400">---</div>
                </div>
                <div class="terminal-border p-4 bg-rose-950/20">
                    <div class="text-[10px] opacity-50 uppercase">Sentiment</div>
                    <div class="text-lg font-bold text-rose-400">BULLISH_SIGNAL</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let chart = null;
        let currentCoin = 'bitcoin';
        let currentPeriod = '7';

        // Инициализация ApexCharts
        function initChart(data) {
            const options = {
                series: [{ name: 'Price', data: data.prices }],
                chart: {
                    type: 'area',
                    height: 450,
                    toolbar: { show: true },
                    animations: { enabled: true },
                    foreColor: '#52637a'
                },
                colors: ['#00f3ff'],
                fill: {
                    type: 'gradient',
                    gradient: {
                        shadeIntensity: 1,
                        opacityFrom: 0.4,
                        opacityTo: 0,
                        stops: [0, 90, 100]
                    }
                },
                dataLabels: { enabled: false },
                stroke: { curve: 'smooth', width: 2 },
                grid: { borderColor: 'rgba(0, 243, 255, 0.05)' },
                xaxis: {
                    type: 'datetime',
                    axisBorder: { show: false },
                    axisTicks: { show: false }
                },
                yaxis: {
                    labels: {
                        formatter: (val) => '$' + val.toLocaleString()
                    }
                },
                tooltip: { theme: 'dark', x: { format: 'dd MMM yyyy HH:mm' } }
            };

            if (chart) chart.destroy();
            chart = new ApexCharts(document.querySelector("#main-chart"), options);
            chart.render();
        }

        async function loadData(coinId) {
            currentCoin = coinId;
            addLog(`ATTEMPTING_SYNC: ${coinId.toUpperCase()}`);
            
            try {
                // Fetch Market Data
                const mRes = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}?localization=false&tickers=false`);
                const mData = await mRes.json();
                
                document.getElementById('active-coin-name').innerText = mData.name.toUpperCase();
                document.getElementById('active-coin-symbol').innerText = `${mData.symbol.toUpperCase()}/USD`;
                document.getElementById('active-price').innerText = `$${mData.market_data.current_price.usd.toLocaleString()}`;
                document.getElementById('stat-cap').innerText = `$${(mData.market_data.market_cap.usd / 1e9).toFixed(2)}B`;
                document.getElementById('stat-vol').innerText = `$${(mData.market_data.total_volume.usd / 1e9).toFixed(2)}B`;
                document.getElementById('stat-ath').innerText = `$${mData.market_data.ath.usd.toLocaleString()}`;

                // Fetch Chart Data
                const cRes = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=${currentPeriod}`);
                const cData = await cRes.json();
                
                initChart({ prices: cData.prices });
                addLog(`SYNC_COMPLETE: ${coinId.toUpperCase()}`);
            } catch (e) {
                addLog(`ERROR: FAILED_TO_CONNECT_TO_NODE`);
            }
        }

        async function loadHotAssets() {
            const res = await fetch('https://api.coingecko.com/api/v3/search/trending');
            const data = await res.json();
            const list = document.getElementById('hot-list');
            list.innerHTML = '';
            
            data.coins.forEach(c => {
                const item = document.createElement('div');
                item.className = 'p-3 border border-white/5 bg-white/5 hover:bg-cyan-500/10 cursor-pointer transition-all flex justify-between items-center';
                item.onclick = () => loadData(c.item.id);
                item.innerHTML = `
                    <div class="flex items-center gap-2">
                        <img src="${c.item.small}" class="w-4 h-4 grayscale opacity-70">
                        <span class="text-xs font-bold">${c.item.symbol}</span>
                    </div>
                    <span class="text-[10px] text-emerald-400">RANK #${c.item.market_cap_rank}</span>
                `;
                list.appendChild(item);
            });
        }

        function addLog(msg) {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.innerText = `> ${new Date().toLocaleTimeString()} | ${msg}`;
            logs.prepend(entry);
            if (logs.children.length > 8) logs.lastChild.remove();
        }

        function setTime(d) {
            currentPeriod = d;
            loadData(currentCoin);
        }

        // Search logic
        document.getElementById('coinSearch').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadData(e.target.value.toLowerCase().trim());
                e.target.value = '';
            }
        });

        // Time and Sync
        setInterval(() => {
            document.getElementById('server-time').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Initial Load
        loadData('bitcoin');
        loadHotAssets();
    </script>
</body>
</html>
