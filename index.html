<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallace Corp. Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Стиль для водяного знака Versacext на фоне */
        body {
            background-color: #FF13F0; /* Neon Pink */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMTAwIiB2aWV3Qm94PSIwIDAgMjAwIDEwMCI+PHRleHQgeD0iMTAiIHk9IjMwIiBmaWxsPSIjMzJDRDMyIiBvcGFjaXR5PSIwLjIyIiBmb250LWZhbWlseT0iQXJpYWwsIEhlbHZldGljYSwgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIyMCI+VmVyc2FjZXh0PC90ZXh0Pjwvc3ZnPg==');
            background-repeat: repeat;
            color: #e2e8f0;
        }
        /* Эффект стекла для карточек */
        .glass-card {
            background: rgba(30, 41, 59, 0.7); /* Slate 800 with opacity */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        /* Неоновая обводка для графика */
        .neon-border {
            box-shadow: 0 0 10px rgba(50, 205, 50, 0.3);
        }
    </style>
</head>
<body class="font-sans min-h-screen">

    <div class="max-w-md mx-auto p-4 md:p-6">
        <header class="flex items-center gap-4 mb-8 p-4 glass-card rounded-2xl border-b border-lime-500/30">
            <img src="https://i.imgur.com/8N4N3u8.png" alt="Wallace Corp Logo" class="h-12 w-auto">
            <div>
                <h1 class="text-3xl font-extrabold text-lime-400 tracking-tight">Wallace Corp.</h1>
                <p class="text-xs text-slate-400 uppercase tracking-widest">Financial Monitoring Division</p>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass-card p-5 rounded-3xl relative overflow-hidden group">
                <div class="absolute inset-0 bg-orange-500/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="flex items-center gap-3 mb-2">
                    <span class="text-xs text-slate-500 uppercase font-bold tracking-wider">Bitcoin</span>
                    <span class="text-xs text-orange-400 font-mono">BTC</span>
                </div>
                <div id="btc-price" class="text-2xl font-mono font-bold text-orange-400">Loading...</div>
                <div class="text-xs text-green-400 mt-1">+2.5% (24h)</div>
            </div>

            <div class="glass-card p-5 rounded-3xl relative overflow-hidden group">
                <div class="absolute inset-0 bg-blue-500/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="flex items-center gap-3 mb-2">
                    <span class="text-xs text-slate-500 uppercase font-bold tracking-wider">USD / KZT</span>
                    <span class="text-xs text-blue-400 font-mono">FIAT</span>
                </div>
                <div id="usd-price" class="text-2xl font-mono font-bold text-blue-400">452.1</div>
                <div class="text-xs text-red-400 mt-1">-0.1% (24h)</div>
            </div>
        </div>

        <div class="glass-card p-5 rounded-3xl neon-border mb-8">
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-sm font-bold text-slate-300 uppercase tracking-wider">Dynamics (Last 7 days)</h2>
                <span class="text-xs text-lime-400 font-mono px-2 py-1 border border-lime-500/30 rounded-full">LIVE</span>
            </div>
            <canvas id="myChart" class="w-full h-60"></canvas>
        </div>

        <div class="space-y-3">
            <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest px-1">System Status</h2>
            <div class="glass-card p-4 rounded-xl text-sm flex items-center gap-3 border border-slate-700">
                <span class="text-lime-500">🟢</span>
                <span class="text-slate-300">API Source:</span>
                <span class="font-mono text-lime-400">CoinGecko REST API</span>
            </div>
            <div class="glass-card p-4 rounded-xl text-sm flex items-center gap-3 border border-slate-700">
                <span class="text-lime-500">🟢</span>
                <span class="text-slate-300">Rendering:</span>
                <span class="font-mono text-lime-400">Chart.js (HTML5 Canvas)</span>
            </div>
            <div class="glass-card p-4 rounded-xl text-sm flex items-center gap-3 border border-slate-700 overflow-x-auto">
                <span class="text-blue-500">🔵</span>
                <span class="text-slate-300 whitespace-nowrap">Background:</span>
                <span class="font-mono text-fuchsia-400 bg-fuchsia-950/50 px-2 py-0.5 rounded">Neon Pink (#FF13F0)</span>
                <span class="font-mono text-lime-300 bg-lime-950/50 px-2 py-0.5 rounded">Watermark: Versacext (Lime)</span>
            </div>
        </div>
    </div>

    <script>
        // Настройка Chart.js: используем Lime Green и Electric Blue
        Chart.defaults.color = '#94a3b8'; // Slate 400
        Chart.defaults.borderColor = 'rgba(148, 163, 184, 0.1)';

        async function fetchData() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=7&interval=daily');
                const data = await response.json();
                
                const prices = data.prices.map(p => p[1]);
                const labels = data.prices.map(p => new Date(p[0]).toLocaleDateString('ru-RU', {weekday: 'short'}));

                // Обновляем цену Bitcoin
                document.getElementById('btc-price').innerText = '$' + prices[prices.length - 1].toLocaleString(undefined, {maximumFractionDigits: 0});

                // Рисуем график в стиле киберпанк
                const ctx = document.getElementById('myChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'BTC Price (USD)',
                            data: prices,
                            borderColor: '#32CD32', // Lime Green
                            borderWidth: 3,
                            pointBackgroundColor: '#32CD32',
                            pointBorderColor: '#0f172a',
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            fill: true,
                            backgroundColor: 'rgba(50, 205, 50, 0.05)', // Очень слабая заливка Lime
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false } },
                            y: { 
                                ticks: { 
                                    callback: function(value) { return '$' + value.toLocaleString(); }
                                },
                                grid: { color: 'rgba(148, 163, 184, 0.05)' }
                            }
                        }
                    }
                });
            } catch (e) {
                console.error("Ошибка сети или API");
                document.getElementById('btc-price').innerText = 'Error';
            }
        }

        fetchData();
    </script>
</body>
</html>
